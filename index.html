<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Inspección STS45</title>
    <style>
        :root { --blue: #1a2a6c; --red: #b22222; --green: #2ecc71; --gray: #f4f4f9; }
        body { font-family: -apple-system, sans-serif; background: var(--gray); margin: 0; padding: 15px; padding-bottom: 100px; }
        .header { background: var(--blue); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #ccc; }
        .card.selected-ok { border-left-color: var(--green); }
        .card.selected-nook { border-left-color: var(--red); }
        .item-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-title { font-weight: bold; font-size: 1.1em; color: #333; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 18px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ok.active { background: var(--green); color: white; border-color: var(--green); }
        .btn-nook.active { background: var(--red); color: white; border-color: var(--red); }
        textarea { width: 100%; margin-top: 10px; border: 1px solid var(--red); border-radius: 8px; padding: 10px; display: none; box-sizing: border-box; background: #fff5f5; }
        .visible { display: block; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-sizing: border-box; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .btn-send { flex: 1; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.5em;">STS45 SPREADER</h1>
    <p style="margin:5px 0 0; opacity: 0.8;">Inspección de Seguridad</p>
</div>

<div id="form-container">
    <!-- Lista de Ítems de Inspección -->
    <script>
        const items = [
            "Estructura Principal y Soldaduras",
            "Puntos de Izaje y Grilletes",
            "Mecanismo Twistlock (Pines)",
            "Cintas de Bloqueo / Desbloqueo",
            "Sensores de Asiento (Landing)",
            "Sistema Hidráulico (Fugas)",
            "Cilindros de Extensión (20'-40'-45')",
            "Guías (Flippers) y Motores",
            "Caja Eléctrica y Cableado",
            "Estado de Mangueras y Conexiones"
        ];

        document.write(items.map((item, index) => `
            <div class="card" id="card-${index}">
                <div class="item-info">
                    <span class="item-title">${index + 1}. ${item}</span>
                    <div class="btn-group">
                        <button class="btn-ok" onclick="updateStatus(${index}, 'OK', this)">OK</button>
                        <button class="btn-nook" onclick="updateStatus(${index}, 'NO OK', this)">NO OK</button>
                    </div>
                </div>
                <textarea id="obs-${index}" placeholder="Detección de falla obligatoria..."></textarea>
            </div>
        `).join(''));
    </script>
</div>

<div class="footer">
    <button class="btn-send" onclick="generateReport()">GENERAR REPORTE PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    function updateStatus(id, status, btn) {
        const card = document.getElementById(`card-${id}`);
        const area = document.getElementById(`obs-${id}`);
        const buttons = btn.parentElement.querySelectorAll('button');
        
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (status === 'OK') {
            card.className = 'card selected-ok';
            area.classList.remove('visible');
            area.value = '';
        } else {
            card.className = 'card selected-nook';
            area.classList.add('visible');
        }
    }

    function generateReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 20;
        let complete = true;

        doc.setFontSize(16);
        doc.text("REPORTE TÉCNICO STS45", 10, y);
        y += 15;
        doc.setFontSize(12);

        items.forEach((item, i) => {
            const card = document.getElementById(`card-${i}`);
            const btnActive = card.querySelector('button.active');
            const obs = document.getElementById(`obs-${i}`).value;

            if (!btnActive) { complete = false; return; }

            const status = btnActive.innerText;
            if (status === 'NO OK' && !obs.trim()) {
                alert(`Debe ingresar observación en: ${item}`);
                complete = false;
                return;
            }

            doc.text(`${i+1}. ${item}: ${status}`, 10, y);
            y += 7;
            if (obs) {
                doc.setFontSize(10);
                doc.text(`   Nota: ${obs}`, 15, y);
                doc.setFontSize(12);
                y += 8;
            }
        });

        if (!complete) {
            alert("Por favor complete todos los campos antes de generar el PDF.");
            return;
        }

        doc.save(`Inspeccion_STS45_${new Date().getTime()}.pdf`);
    }
</script>

</body>
</html>
