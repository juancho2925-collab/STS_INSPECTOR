<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>INSPECCIÓN SPREADERS STS45</title>
    <style>
        :root { --bg: #050a0f; --card: #0d141d; --blue: #00d2ff; --green: #238636; --red: #f85149; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* HEADER IGUAL AL MANUAL */
        .app-header { background: var(--card); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--blue); }
        .logo-box { border: 2px solid var(--blue); width: 60px; height: 60px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .logo-inner { width: 20px; height: 20px; background: var(--blue); }
        .title { font-size: 28px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
        .subtitle { color: var(--blue); font-size: 14px; margin-top: 5px; font-weight: bold; }

        /* PANELES DE CONTROL */
        .status-bar { display: flex; gap: 10px; padding: 15px; }
        .stat-card { flex: 1; background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #30363d; }
        .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: bold; margin-top: 5px; }

        /* SECCIONES DEL MANUAL */
        .section-title { padding: 15px; background: #161b22; color: var(--blue); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .item-card { background: var(--card); padding: 15px; border-bottom: 1px solid #30363d; display: flex; flex-direction: column; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .item-text { font-size: 15px; font-weight: 500; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-check { padding: 10px 15px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: white; font-weight: bold; }
        .btn-check.ok-active { background: var(--green); border-color: var(--green); }
        .btn-check.no-active { background: var(--red); border-color: var(--red); }

        textarea { width: 100%; margin-top: 10px; background: #0d1117; border: 1px solid var(--red); color: white; padding: 10px; border-radius: 6px; display: none; }

        /* FOOTER NAVEGACIÓN */
        .nav { position: fixed; bottom: 0; width: 100%; background: #161b22; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; }
        .nav-btn { color: #8b949e; font-size: 10px; text-align: center; text-decoration: none; }
        .nav-btn.active { color: var(--blue); }
        
        .btn-save { display: block; width: 90%; margin: 20px auto; background: var(--blue); color: black; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; border: none; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="logo-box"><div class="logo-inner"></div></div>
        <div class="title">INSPECCIÓN<br>SPREADERS</div>
        <div class="subtitle">SISTEMA TÉCNICO DE VERIFICACIÓN STS45</div>
    </div>

    <div class="status-bar">
        <div class="stat-card"><div class="stat-label">Estado</div><div class="stat-value" style="color:#2ecc71">ONLINE</div></div>
        <div class="stat-card"><div class="stat-label">Turno</div><div id="txt-turno" class="stat-value">T-</div></div>
    </div>

    <div id="checklist-form">
        <!-- SECCIÓN: SISTEMA ELÉCTRICO -->
        <div class="section-title">03 - CHECKLIST: SISTEMA ELÉCTRICO</div>
        <div id="sec-electrica"></div>

        <!-- SECCIÓN: ESTRUCTURA -->
        <div class="section-title">03 - CHECKLIST: ESTRUCTURA Y MECÁNICA</div>
        <div id="sec-mecanica"></div>
    </div>

    <button class="btn-save" onclick="guardar()">GUARDAR INSPECCIÓN (PDF)</button>

    <div class="nav">
        <a href="#" class="nav-btn active"><div>🏠</div>INICIO</a>
        <a href="#" class="nav-btn"><div>📋</div>CHECKLIST</a>
        <a href="#" class="nav-btn"><div>📷</div>FOTOS</a>
        <a href="#" class="nav-btn"><div>📂</div>HISTORIAL</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // DATOS EXACTOS DEL MANUAL V3.0
        const itemsElectricos = ["Conector HARTING", "Cableado principal", "Terminales de tierra", "Fusibles"];
        const itemsMecanicos = ["Estructura y Soldaduras", "Pines Twistlock", "Cilindros Extensión", "Motores Flippers", "Mangueras Hidráulicas"];

        function renderItems(lista, containerId) {
            const container = document.getElementById(containerId);
            lista.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <div class="item-row">
                        <span class="item-text">${text}</span>
                        <div class="btn-group">
                            <button class="btn-check" onclick="marcar(this, '${containerId}-${i}', 'OK')">OK</button>
                            <button class="btn-check" onclick="marcar(this, '${containerId}-${i}', 'NO OK')">NO OK</button>
                        </div>
                    </div>
                    <textarea id="obs-${containerId}-${i}" placeholder="OBSERVACIÓN OBLIGATORIA (NO OK)"></textarea>
                `;
                container.appendChild(div);
            });
        }

        function marcar(btn, id, status) {
            const parent = btn.parentElement;
            const card = btn.closest('.item-card');
            const obs = document.getElementById(`obs-${id}`);
            parent.querySelectorAll('button').forEach(b => b.className = 'btn-check');
            
            if(status === 'OK') {
                btn.classList.add('ok-active');
                obs.style.display = 'none';
            } else {
                btn.classList.add('no-active');
                obs.style.display = 'block';
            }
        }

        // LÓGICA DE TURNO SEGÚN MANUAL (Paso 1)
        function setTurno() {
            const h = new Date().getHours();
            let t = "T3 (23-07h)";
            if(h >= 7 && h < 15) t = "T1 (07-15h)";
            else if(h >= 15 && h < 23) t = "T2 (15-23h)";
            document.getElementById('txt-turno').innerText = t;
        }

        function guardar() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("MANUAL DE INSPECCIÓN SPREADERS V3.0", 10, 20);
            doc.setFontSize(12);
            doc.text("Puerto Antioquia - SPQC", 10, 30);
            doc.text("Resultado: Inspección Guardada Localmente", 10, 45);
            doc.save("Reporte_STS45_V3.pdf");
            alert("PDF Generado: Reporte_STS45_V3.pdf");
        }

        renderItems(itemsElectricos, 'sec-electrica');
        renderItems(itemsMecanicos, 'sec-mecanica');
        setTurno();
    </script>
</body>
</html>
